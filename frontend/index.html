<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Rubium — Главная</title>
    <link rel="icon" type="image/png" href="data/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Unbounded:wght@600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <style>
        :root {
            --bg: #0F0F1A;
            --surface: rgba(255,255,255,0.03);
            --surface-hover: rgba(255,255,255,0.06);
            --glass: rgba(255,255,255,0.04);
            --glass-border: rgba(255,255,255,0.06);
            --brand: #A78BFA;
            --brand-glow: rgba(167,139,250,0.15);
            --accent: #F472B6;
            --success: #34D399;
            --warning: #FBBF24;
            --danger: #F87171;
            --text: #F1F5F9;
            --text-secondary: #94A3B8;
            --text-muted: #64748B;
            --radius: 24px;
            --radius-sm: 16px;
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);
            min-height:100vh;min-height:100dvh;-webkit-font-smoothing:antialiased;
            display:flex;flex-direction:column;overflow-x:hidden;
        }
        body::before{
            content:'';position:fixed;top:-300px;left:-300px;width:800px;height:800px;
            background:radial-gradient(circle,rgba(167,139,250,0.06),transparent 70%);
            pointer-events:none;z-index:0;
        }
        body::after{
            content:'';position:fixed;bottom:-250px;right:-250px;width:700px;height:700px;
            background:radial-gradient(circle,rgba(244,114,182,0.05),transparent 70%);
            pointer-events:none;z-index:0;
        }

        .app{display:flex;flex-direction:column;min-height:100vh;min-height:100dvh;position:relative;z-index:1}

        .topbar{
            display:flex;align-items:center;justify-content:space-between;
            padding:16px 24px;flex-shrink:0;
        }
        .brand{font-family:'Unbounded',sans-serif;font-size:1.2rem;font-weight:800;letter-spacing:-1px;color:var(--text)}
        .brand span{background:linear-gradient(135deg,var(--brand),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .user-name-top{
            font-size:0.82rem;font-weight:600;color:var(--text-secondary);
            padding:8px 16px;background:var(--glass);border:1px solid var(--glass-border);
            border-radius:20px;backdrop-filter:blur(20px);
        }

        .content{
            flex:1;display:grid;grid-template-columns:1fr 1fr;
            grid-template-rows:auto auto auto;
            gap:16px;padding:8px 24px 100px;
        }
        @keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

        /* Hero — spans full width */
        .hero-card{
            grid-column:1/-1;
            background:linear-gradient(135deg,rgba(167,139,250,0.1),rgba(244,114,182,0.06));
            border:1px solid rgba(167,139,250,0.1);border-radius:var(--radius);
            padding:28px 28px 24px;position:relative;overflow:hidden;
            animation:fadeUp 0.5s ease;
            display:flex;align-items:center;justify-content:space-between;
            gap:20px;flex-wrap:wrap;
        }
        .hero-card::after{
            content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;
            background:radial-gradient(circle,rgba(167,139,250,0.25),transparent 70%);
            border-radius:50%;
        }
        .hero-left{position:relative;z-index:1;min-width:0}
        .hero-greeting{font-size:0.85rem;color:var(--text-secondary);margin-bottom:6px}
        .hero-name{font-size:2.2rem;font-weight:800;letter-spacing:-1px}
        .hero-name span{background:linear-gradient(135deg,var(--brand),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .hero-stats{display:flex;gap:24px;margin-top:16px}
        .hero-stat .num{font-size:1.3rem;font-weight:800;letter-spacing:-0.5px}
        .hero-stat .lbl{font-size:0.62rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px;font-family:'JetBrains Mono',monospace}
        .num.purple{color:var(--brand)} .num.green{color:var(--success)} .num.amber{color:var(--warning)}

        .hero-actions{display:flex;flex-direction:column;gap:10px;position:relative;z-index:1;flex-shrink:0}
        .hero-btn{
            display:flex;align-items:center;gap:10px;padding:14px 22px;
            border-radius:var(--radius-sm);font-weight:700;font-size:0.88rem;
            cursor:pointer;transition:all 0.3s;border:none;font-family:inherit;
            text-decoration:none;letter-spacing:-0.3px;white-space:nowrap;
            min-width:180px;justify-content:center;
        }
        .hero-btn.daily{
            background:linear-gradient(135deg,#FBBF24,#F59E0B);
            color:#0F0F1A;box-shadow:0 8px 28px rgba(245,158,11,0.25);
        }
        .hero-btn.daily:hover{transform:translateY(-2px);box-shadow:0 14px 36px rgba(245,158,11,0.35)}
        .hero-btn.story{
            background:linear-gradient(135deg,var(--brand),#8B5CF6);
            color:#fff;box-shadow:0 8px 28px rgba(139,92,246,0.25);
        }
        .hero-btn.story:hover{transform:translateY(-2px);box-shadow:0 14px 36px rgba(139,92,246,0.35)}

        /* Glass card */
        .glass-card{
            background:var(--glass);border:1px solid var(--glass-border);
            border-radius:var(--radius);padding:22px 20px;
            backdrop-filter:blur(20px);animation:fadeUp 0.6s ease;
            display:flex;flex-direction:column;justify-content:center;
        }
        .card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
        .card-title{font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-muted);font-family:'JetBrains Mono',monospace}
        .card-badge{font-size:0.6rem;color:var(--brand);font-family:'JetBrains Mono',monospace;font-weight:600;text-decoration:none}

        .week-dots{display:flex;gap:6px}
        .week-dot{
            flex:1;aspect-ratio:1;border-radius:50%;transition:all 0.3s;
            background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.06);
            display:flex;align-items:center;justify-content:center;
            font-size:0.55rem;color:var(--text-muted);font-family:'JetBrains Mono',monospace;
        }
        .week-dot.done{background:rgba(52,211,153,0.12);border-color:var(--success);color:var(--success)}
        .week-dot.miss{background:rgba(248,113,113,0.08);border-color:var(--danger);color:var(--danger)}
        .week-dot.today{background:rgba(167,139,250,0.12);border-color:var(--brand);color:var(--brand);box-shadow:0 0 12px var(--brand-glow)}

        .topics-row{display:flex;gap:8px;flex-wrap:wrap}
        .topic-chip{
            padding:8px 14px;border-radius:18px;font-size:0.72rem;font-weight:600;
            background:var(--glass);border:1.5px solid var(--glass-border);
            cursor:pointer;transition:all 0.25s;text-decoration:none;color:var(--text-secondary);
            white-space:nowrap;
        }
        .topic-chip:hover{background:var(--surface-hover);border-color:rgba(167,139,250,0.3);color:var(--text);transform:translateY(-1px)}
        .topic-chip.done{border-color:rgba(52,211,153,0.2);color:var(--success)}
        .topic-chip.active{border-color:var(--brand);color:var(--brand);background:rgba(167,139,250,0.06)}

        .bottom-nav{
            display:flex;justify-content:space-around;align-items:center;
            padding:10px 8px 18px;border-top:1px solid rgba(255,255,255,0.04);
            background:rgba(15,15,26,0.9);backdrop-filter:blur(20px);
            z-index:100;flex-shrink:0;
        }
        .nav-item{
            display:flex;flex-direction:column;align-items:center;gap:4px;
            text-decoration:none;color:var(--text-muted);font-size:0.62rem;
            font-weight:600;transition:all 0.2s;padding:4px 12px;border-radius:12px;
            font-family:'JetBrains Mono',monospace;letter-spacing:0.5px;
        }
        .nav-item.active{color:var(--brand)}
        .nav-item i{font-size:1.1rem}

        @media (max-width: 600px) {
            .content{grid-template-columns:1fr;padding:8px 16px 100px}
            .hero-card{flex-direction:column;align-items:flex-start}
            .hero-name{font-size:1.7rem}
            .hero-actions{flex-direction:row;width:100%}
            .hero-btn{flex:1;min-width:0;font-size:0.8rem;padding:14px 16px}
        }
    </style>
</head>
<body>
<div class="app">
    <div class="topbar">
        <div class="brand"><span>Rub</span>ium</div>
        <div class="user-name-top" id="userNameTop">...</div>
    </div>

    <div class="content">
        <!-- Hero -->
        <div class="hero-card">
            <div class="hero-left">
                <div class="hero-greeting">С возвращением</div>
                <div class="hero-name"><span id="userName">...</span></div>
                <div class="hero-stats">
                    <div class="hero-stat"><div class="num purple" id="statSolved">0</div><div class="lbl">Решено</div></div>
                    <div class="hero-stat"><div class="num green" id="statCorrect">0</div><div class="lbl">Верно</div></div>
                    <div class="hero-stat"><div class="num amber" id="statAccuracy">—%</div><div class="lbl">Точность</div></div>
                </div>
            </div>
            <div class="hero-actions">
                <a href="trainer.html?mode=daily" class="hero-btn daily">
                    <i class="fa-solid fa-calendar-check"></i> Ежедневные задания
                </a>
                <a href="trainer.html?mode=story" class="hero-btn story">
                    <i class="fa-solid fa-book-open"></i> Сюжетный режим
                </a>
            </div>
        </div>

        <!-- Week -->
        <div class="glass-card">
            <div class="card-header">
                <span class="card-title">Неделя</span>
                <span class="card-badge" id="streakLabel">🔥 0 дн.</span>
            </div>
            <div class="week-dots" id="weekDots"></div>
        </div>

        <!-- Topics -->
        <div class="glass-card">
            <div class="card-header">
                <span class="card-title">Темы</span>
            </div>
            <div class="topics-row" id="topicsRow"></div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="dashboard.html" class="nav-item active"><i class="fa-solid fa-house"></i> Главная</a>
        <a href="trainer.html" class="nav-item"><i class="fa-solid fa-bolt"></i> Тренировка</a>
        <a href="stats.html" class="nav-item"><i class="fa-solid fa-chart-bar"></i> Статистика</a>
        <a href="profile.html" class="nav-item"><i class="fa-solid fa-user"></i> Профиль</a>
        <button onclick="logout()" style="background:none;border:none;color:var(--text-muted);font-family:'JetBrains Mono',monospace;font-size:0.62rem;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;padding:4px 12px"><i class="fa-solid fa-arrow-right-from-bracket"></i> Выйти</button>
    </div>
</div>

<script>
    const API = 'http://localhost:5080';
    const DAYS = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];

    async function init() {
        const { data: { user } } = await supabase.auth.getUser();
        if (!user) { window.location.href = 'login.html'; return; }
        const name = user.user_metadata?.first_name || user.email?.split('@')[0] || 'ученик';
        document.getElementById('userName').textContent = name;
        document.getElementById('userNameTop').textContent = name;
        loadData();
    }

    function loadData() {
        const s = JSON.parse(localStorage.getItem('rubium_stats') || '{"solved":0,"correct":0}');
        const streak = JSON.parse(localStorage.getItem('rubium_streak') || '{"days":0,"lastDate":""}');
        const completedTopics = JSON.parse(localStorage.getItem('rubium_topics') || '[]');
        const history = JSON.parse(localStorage.getItem('rubium_history') || '[]');

        document.getElementById('statSolved').textContent = s.solved;
        document.getElementById('statCorrect').textContent = s.correct;
        document.getElementById('statAccuracy').textContent = s.solved > 0 ? Math.round((s.correct/s.solved)*100)+'%' : '—%';
        document.getElementById('streakLabel').textContent = `🔥 ${streak.days} дн.`;

        const today = new Date();
        let weekHtml = '';
        for (let i = 6; i >= 0; i--) {
            const d = new Date(today); d.setDate(d.getDate()-i);
            const key = d.toISOString().split('T')[0];
            const daySolved = history.filter(h => (h.date||h.timestamp?.split('T')[0]) === key).length;
            const isToday = i === 0;
            let cls = '';
            if (daySolved > 0) cls = 'done';
            else if (!isToday) cls = 'miss';
            if (isToday) cls = 'today';
            weekHtml += `<div class="week-dot ${cls}">${DAYS[new Date(d).getDay()===0?6:new Date(d).getDay()-1]||DAYS[6]}</div>`;
        }
        document.getElementById('weekDots').innerHTML = weekHtml;

        const allTopics = [
            {id:'arithmetic',name:'Арифметика'},{id:'equations',name:'Уравнения'},
            {id:'geometry',name:'Геометрия'},{id:'functions',name:'Функции'},
            {id:'probability',name:'Вероятность'},{id:'trigonometry',name:'Тригонометрия'},
        ];
        document.getElementById('topicsRow').innerHTML = allTopics.map(t => {
            const done = completedTopics.includes(t.id);
            const active = !done && (completedTopics.length === allTopics.findIndex(x=>x.id===t.id));
            return `<a href="trainer.html?subject=math&topic=${t.id}" class="topic-chip ${done?'done':active?'active':''}">${t.name}</a>`;
        }).join('');
    }

    async function logout() {
        ['rubium_stats','rubium_history','rubium_streak','rubium_topic_stats','rubium_topics'].forEach(k=>localStorage.removeItem(k));
        await supabase.auth.signOut();
        window.location.href='login.html';
    }
    init();
</script>
</body>
</html>
